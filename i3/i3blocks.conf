SCRIPT_DIR=/home/ettore/.config/i3/scripts
command=$SCRIPT_DIR/$BLOCK_NAME
separator_block_width=30
color=#666622


[song]
command=xprop -name "Spotify Premium - Linux Preview" _NET_WM_ICON_NAME|\cut -d "\"" -f 2|cut -b 11-
label=
interval=1
color=#2ebd59

[load_average]
interval=1
label= 

[disk]
interval=1
label= 
command=if [ $button ]; then thunar; fi; $SCRIPT_DIR/disk

[iface]
interval=10
command=if [ $button ]; then iwgtk; fi; $SCRIPT_DIR/iface

[brightness]
label= 
interval=1

[volume]
command=if [ $button ]; then pavucontrol; fi; $SCRIPT_DIR/volume
interval=1

[packages]
label=
#interval=300
command=if [ $button ]; then termite --exec="yay -Syyu"; fi; $SCRIPT_DIR/packages

[battery]
instance=0
interval=5

[date]
command=date '+ %H:%M'
interval=1
label=

[shutdown_menu]
#FG_COLOR=#bbbbbb
#BG_COLOR=#111111
#HLFG_COLOR=#111111
#HLBG_COLOR=#bbbbbb
#BORDER_COLOR=#222222
#ROFI_TEXT=
#ROFI_OPTIONS=-width 11 -location 3 -hide-scrollbar -bw 2
#ZENITY_TITLE=Menu
#ZENITY_TEXT=Action:
#ZENITY_OPTIONS=--column= --hide-header
#ENABLE_CONFIRMATIONS=true
#LAUNCHER=rofi
#LOCKSCRIPT=i3lock --color=${BG_COLOR#"#"}
full_text=   
