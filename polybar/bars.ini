[bar/secondary]
font-0 = "Cascadia Mono PL:pixelsize=13;3"
font-1 = "FontAwesome:pixelsize=13;3"
font-2 = "Font Awesome 5 Free Solid:pixelsize=13;3"
font-3 = "Font Awesome 5 Free:pixelsize=13;3"
font-4 = "Font Awesome 5 Brands:pixelsize=13;3"

monitor = ${env:MONITOR:}

bottom=false
width = 100%
height = 30
fixed-center = true
border-right-size = 10
border-left-size = 10
border-top-size = 10
padding = 0
background = ${color.background}
foreground = ${color.foreground}

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

modules-left = workspaces
modules-center = 
modules-right = time


[bar/primary]
font-0 = "Cascadia Mono PL:pixelsize=13;3"
font-1 = "FontAwesome:pixelsize=13;3"
font-2 = "Font Awesome 5 Free Solid:pixelsize=13;3"
font-3 = "Font Awesome 5 Free:pixelsize=13;3"
font-4 = "Font Awesome 5 Brands:pixelsize=13;3"

monitor = ${env:MONITOR:}

bottom=false
width = 100%
height = 30
fixed-center = true
border-right-size = 10
border-left-size = 10
border-top-size = 10
padding = 0
background = ${color.background}
foreground = ${color.foreground}

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

modules-left = launcher workspaces title
modules-center = time
